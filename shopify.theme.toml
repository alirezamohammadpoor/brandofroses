# Shopify CLI environments
# Theme ids come from `shopify theme list` after creating the Live
# and unpublished Staging themes in the Shopify admin.
#
# Usage:
#   shopify theme dev -e dev          # personal dev theme (ephemeral, auto-managed)
#   shopify theme push -e staging     # unpublished staging theme (usually CI-only)
#   shopify theme push -e production  # live theme (CI-only)
# Docs: https://shopify.dev/docs/themes/tools/cli/environments

[environments.dev]
store = "brandofroses-2.myshopify.com"
theme = "200059257163"

[environments.staging]
store = "brandofroses-2.myshopify.com"
theme = "200110473547"

[environments.production]
store = "brandofroses-2.myshopify.com"
theme = "200110440779"
